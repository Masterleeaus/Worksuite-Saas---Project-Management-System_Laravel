name: Deploy

# Deployment is triggered manually or on push to main/master.
# Set up GitHub Environments ("production", "staging") with required reviewers
# and store secrets there (see Required Secrets below).
#
# Required Secrets (set in GitHub → Settings → Secrets / Environments):
#   DEPLOY_SSH_HOST        — SSH server hostname or IP
#   DEPLOY_SSH_USER        — SSH username
#   DEPLOY_SSH_KEY         — Private SSH key (PEM format)
#   DEPLOY_SSH_PORT        — SSH port (default 22)
#   DEPLOY_KNOWN_HOSTS     — Pre-recorded SSH known_hosts entry for the deploy server
#   DEPLOY_PATH            — Absolute path to app on server (e.g. /var/www/worksuite)
#   DEPLOY_BRANCH          — Branch to pull on server (usually main or master)
#   APP_URL                — Production app URL used for post-deploy health check

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

# Prevent concurrent deploys to the same environment
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      contents: read

    # Only deploy from push events on main/master, or when manually dispatched
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          if_key_exists: replace

      - name: Deploy via SSH
        run: |
          ssh -p ${{ secrets.DEPLOY_SSH_PORT || 22 }} ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }} << 'ENDSSH'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> Pulling latest code from ${{ secrets.DEPLOY_BRANCH || 'main' }}"
            git pull origin ${{ secrets.DEPLOY_BRANCH || 'main' }}

            echo "==> Installing/updating Composer dependencies"
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

            echo "==> Running migrations"
            php artisan migrate --force --no-interaction

            echo "==> Clearing and rebuilding caches"
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "==> Restarting queue workers (if applicable)"
            php artisan queue:restart || true

            echo "==> Deployment complete."
          ENDSSH

      - name: Post-deploy health check
        run: |
          curl --fail --silent --max-time 30 ${{ secrets.APP_URL }} | grep -c "html" > /dev/null \
            && echo "Health check passed." \
            || echo "Warning: health check did not receive a valid HTML response."
        continue-on-error: true
