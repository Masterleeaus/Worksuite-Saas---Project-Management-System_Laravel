name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: "Skip database migrations"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: self-hosted
    permissions:
      contents: read

    env:
      DEPLOY_PATH: /home/saassmar/domains/cleansm.art/public_html
      DEPLOY_BRANCH: main

    steps:
      - name: Verify runner context
        run: |
          echo "User: $(whoami)"
          echo "Host: $(hostname)"
          echo "PWD: $(pwd)"

      - name: Check deploy path
        run: |
          if [ ! -d "$DEPLOY_PATH" ]; then
            echo "Deploy path missing: $DEPLOY_PATH"
            exit 1
          fi

      - name: Check app files
        run: |
          cd "$DEPLOY_PATH"
          ls -la
          if [ ! -f ".env" ]; then
            echo ".env missing"
            exit 1
          fi
          if [ ! -f "artisan" ]; then
            echo "artisan missing"
            exit 1
          fi

      - name: Update code
        run: |
          cd "$DEPLOY_PATH"
          git status
          git fetch origin
          git pull --ff-only origin "$DEPLOY_BRANCH"

      - name: Install composer dependencies
        run: |
          cd "$DEPLOY_PATH"
          composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Run migrations
        if: github.event.inputs.skip_migrations != 'true'
        run: |
          cd "$DEPLOY_PATH"
          php artisan migrate --force --no-interaction

      - name: Rebuild Laravel caches
        run: |
          cd "$DEPLOY_PATH"
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache || echo "route:cache failed, skipping"
          php artisan view:cache || echo "view:cache failed, skipping"

      - name: Restart queue workers
        run: |
          cd "$DEPLOY_PATH"
          php artisan queue:restart || true
