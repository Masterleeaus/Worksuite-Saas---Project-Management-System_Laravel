name: Lint

on:
  push:
    branches: [main, master, develop]
  pull_request_target:
    branches: [main, master, develop]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-syntax:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # pull_request_target runs in base-branch context; explicitly check out
          # the PR head so lint runs against the proposed changes.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring
          coverage: none

      - name: Check PHP syntax (parallel-lint via find)
        run: |
          ERRORS=$(find app config database routes tests -name "*.php" -print0 \
            | xargs -0 -r -n1 -P4 php -l 2>&1 \
            | grep -v "No syntax errors detected" || true)
          if [ -n "$ERRORS" ]; then
            echo "PHP syntax errors found:"
            echo "$ERRORS"
            exit 1
          fi
          echo "All PHP files are syntax-clean."

  pint:
    name: Laravel Pint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-lint-${{ hashFiles('composer.lock') }}
          restore-keys: composer-lint-

      - name: Ensure bootstrap/cache is writable before Composer post-install hooks
        run: mkdir -p bootstrap/cache && chmod -R 775 storage bootstrap/cache

      - name: Install Composer dependencies
        run: |
          if ! composer install --no-interaction --prefer-dist --optimize-autoloader; then
            composer update laravel/mcp laravel/reverb --no-interaction --prefer-dist --no-scripts
            composer install --no-interaction --prefer-dist --optimize-autoloader
          fi

      - name: Run Laravel Pint (check only — no auto-fix)
        run: php vendor/bin/pint --test
        continue-on-error: true
        # Pint is in composer require-dev; --test exits non-zero if files need formatting.
        # This legacy codebase has pre-existing style violations; failures are informational.

  phpstan:
    name: PHPStan Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # PHPStan surfaces pre-existing type issues in this legacy codebase.
    # Failures are informational and do not block CI.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, dom, curl, zip, bcmath
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-phpstan-${{ hashFiles('composer.lock') }}
          restore-keys: composer-phpstan-

      - name: Ensure bootstrap/cache is writable before Composer post-install hooks
        run: mkdir -p bootstrap/cache && chmod -R 775 storage bootstrap/cache

      - name: Install Composer dependencies
        run: |
          if ! composer install --no-interaction --prefer-dist --optimize-autoloader; then
            composer update laravel/mcp laravel/reverb --no-interaction --prefer-dist --no-scripts
            composer install --no-interaction --prefer-dist --optimize-autoloader
          fi

      - name: Prepare .env for PHPStan
        run: |
          cp .env.example .env
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          echo "DB_DATABASE=/tmp/phpstan.sqlite" >> .env
          touch /tmp/phpstan.sqlite
          php artisan key:generate --quiet

      - name: Run PHPStan
        run: php vendor/bin/phpstan analyse --configuration=phpstan.neon.dist --memory-limit=-1 --no-progress
