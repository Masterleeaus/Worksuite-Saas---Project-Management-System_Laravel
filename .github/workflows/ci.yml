name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PHP ${{ matrix.php }} — Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        # composer.lock requires PHP >=8.2 (symfony 7.x, pint 1.25, lcobucci/jwt 5.5 etc.)
        php: ["8.2", "8.3"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, dom, curl, zip, bcmath, intl, gd, exif, fileinfo
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Ensure bootstrap/cache is writable before Composer post-install hooks
        run: mkdir -p bootstrap/cache && chmod -R 775 storage bootstrap/cache

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Reinstall PHPUnit and Collision to ensure complete vendor files
        # The committed vendor may have an incomplete phpunit installation (missing Event/Events/Test/*).
        # composer install skips reinstall when installed.json says the version is present.
        # Force a clean reinstall of both packages to guarantee all files exist.
        run: composer reinstall phpunit/phpunit nunomaduro/collision --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci --prefer-offline

      - name: Build frontend assets
        run: npm run production
        env:
          NODE_ENV: production

      - name: Prepare .env
        run: |
          cp .env.example .env
          # Override to CI-safe values
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's/^APP_DEBUG=.*/APP_DEBUG=true/' .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          echo "DB_DATABASE=/tmp/worksuite_ci.sqlite" >> .env
          echo "CACHE_DRIVER=array" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          echo "MAIL_MAILER=array" >> .env

      - name: Create SQLite database
        run: touch /tmp/worksuite_ci.sqlite

      - name: Generate app key
        run: php artisan key:generate

      - name: Clear caches
        run: |
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear

      - name: Run migrations
        run: php artisan migrate --force --no-interaction

      - name: Run tests
        run: php artisan test --no-interaction
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: /tmp/worksuite_ci.sqlite
          CACHE_DRIVER: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
