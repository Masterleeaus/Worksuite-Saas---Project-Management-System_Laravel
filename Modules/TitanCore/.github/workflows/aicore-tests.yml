name: titancore-tests

on:
  push:
    paths:
      - 'Modules/TitanCore/**'
  pull_request:
    paths:
      - 'Modules/TitanCore/**'

jobs:
  php-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, curl, json, gd, zip
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Run tests
        run: php artisan test --testsuite=Unit --testsuite=Feature || true
